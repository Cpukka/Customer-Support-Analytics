[build]
builder = "nixpacks"

[build.nixpacks]
plan = "nixpacks.toml"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[services.backend]
source = "backend/CustomerSupportAPI"
type = "web"
healthcheckPath = "/health"
healthcheckTimeout = 100
startCommand = "dotnet CustomerSupportAPI.dll --urls http://0.0.0.0:$PORT"

[services.aiservice]
source = "ai-service"
type = "web"
healthcheckPath = "/health"
healthcheckTimeout = 100
startCommand = "uvicorn app:app --host 0.0.0.0 --port $PORT"

[services.frontend]
source = "frontend"
type = "web"
healthcheckPath = "/"
healthcheckTimeout = 100
startCommand = "npm start"